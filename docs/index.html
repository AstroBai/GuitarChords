<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guitar Chords</title>
  <style>
    :root {
      --bg: #f4f7f3;
      --card: #ffffff;
      --ink: #1f2d1f;
      --accent: #216c4a;
      --accent-soft: #d9f0e5;
      --line: #d5ded3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 10%, #edf7f0 0%, transparent 35%),
        radial-gradient(circle at 80% 0%, #e8f3ec 0%, transparent 28%),
        var(--bg);
      color: var(--ink);
    }
    .app { max-width: 1320px; margin: 0 auto; padding: 16px; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      position: sticky;
      top: 8px;
      z-index: 2;
    }
    input, select, button {
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid #bccabf;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
    }
    button {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }
    .meta { margin: 10px 0; font-size: 14px; }
    .status {
      margin: 6px 0 10px;
      font-size: 13px;
      border: 1px solid #d5ded3;
      border-radius: 8px;
      padding: 8px 10px;
      background: #f7fbf8;
    }
    .status.err {
      border-color: #e5b5b5;
      background: #fff6f6;
      color: #8a2424;
    }
    .jump { margin: 8px 0 12px; display: flex; flex-wrap: wrap; gap: 8px; }
    .jump a {
      color: #0f5e3f;
      text-decoration: none;
      border: 1px solid #b9d6c9;
      background: var(--accent-soft);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 13px;
    }
    .group-title { margin: 16px 0 8px; font-size: 20px; font-weight: 700; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(460px, 1fr)); gap: 14px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 12px; }
    .svg-wrap { border: 1px solid #e8efe8; border-radius: 8px; padding: 6px; overflow: auto; }
    .notes { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .notes button { background: #fff; color: var(--ink); border-color: #b8c7ba; }
    @media (max-width: 1000px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <label>Chord <input id="chord" value="Cmaj" /></label>
      <label>Inversion Filter
        <select id="inversion-filter">
          <option value="all" selected>All</option>
          <option value="root">Root position</option>
          <option value="1st">1st inversion</option>
          <option value="2nd">2nd inversion</option>
          <option value="3rd">3rd inversion</option>
        </select>
      </label>
      <button id="search">Generate</button>
    </div>
    <div class="meta" id="meta">Loading Python engine...</div>
    <div class="status" id="status">Status: idle</div>
    <div class="jump" id="jump"></div>
    <div id="groups"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.27.5/full/pyodide.js"></script>
  <script>
    let state = { chord: 'Cmaj', inversionFilter: 'all', page: 1, pageCount: 1 };
    let pyodide = null;
    let pyReady = null;

    const isMobileAudio = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent || '');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let sampleBuffer = null;
    let sampleBaseFreq = 110.0;
    let audioUnlocked = false;
    let htmlAudioUnlocked = false;
    let mobileWebAudioReady = false;
    let mobileWebAudioFailed = false;
    const FIXED_NOTE_DURATION = 0.48;
    const SCHEDULE_LEAD = 0.06;
    const MOBILE_AUDIO_POOL_SIZE = 10;
    let mobileAudioPool = [];
    let mobileAudioPoolReady = false;
    let mobilePoolIndex = 0;

    function setStatus(message, isError = false) {
      const el = document.getElementById('status');
      if (!el) return;
      el.textContent = `Status: ${message}`;
      el.classList.toggle('err', !!isError);
    }

    window.addEventListener('error', (e) => {
      setStatus(`Script error: ${e.message || 'unknown'}`, true);
    });
    window.addEventListener('unhandledrejection', (e) => {
      const msg = e.reason && e.reason.message ? e.reason.message : String(e.reason || 'unknown');
      setStatus(`Promise error: ${msg}`, true);
    });

    async function ensureAudioReady() {
      if (isMobileAudio && !mobileWebAudioReady) {
        return;
      }
      setStatus(`Audio state: ${audioCtx.state}`);
      if (audioCtx.state !== 'running') {
        try {
          setStatus('Requesting audio unlock...');
          await audioCtx.resume();
          audioUnlocked = true;
          setStatus('Audio unlocked');
        } catch (e) {
          throw new Error('Audio is locked. Tap a play button again.');
        }
      }
    }

    async function ensureSampleLoaded() {
      if (isMobileAudio && !mobileWebAudioReady) {
        return null;
      }
      await ensureAudioReady();
      if (sampleBuffer) return sampleBuffer;
      setStatus('Loading guitar.wav...');
      const res = await fetch('./guitar.wav');
      if (!res.ok) throw new Error('guitar.wav not found in docs/.');
      const arr = await res.arrayBuffer();
      try {
        sampleBuffer = await audioCtx.decodeAudioData(arr);
      } catch (e) {
        setStatus('Sample decode failed, fallback to HTML audio', true);
        return null;
      }
      setStatus('Sample loaded');
      return sampleBuffer;
    }

    async function ensureMobileWebAudioReady() {
      if (!isMobileAudio || mobileWebAudioReady || mobileWebAudioFailed) return;
      try {
        if (audioCtx.state !== 'running') {
          await audioCtx.resume();
        }
        audioUnlocked = true;

        if (!sampleBuffer) {
          const res = await fetch('./guitar.wav?v=20260329d');
          if (!res.ok) throw new Error('guitar.wav not found in docs/.');
          const arr = await res.arrayBuffer();
          sampleBuffer = await audioCtx.decodeAudioData(arr);
        }

        mobileWebAudioReady = true;
        setStatus('Mobile WebAudio ready (sync mode)');
      } catch (e) {
        mobileWebAudioFailed = true;
        setStatus('Mobile WebAudio unavailable, using HTML audio fallback');
      }
    }

    async function ensureHtmlAudioReady() {
      if (!isMobileAudio || htmlAudioUnlocked) return;
      const probe = new Audio('./guitar.wav?v=20260329c');
      probe.preload = 'auto';
      probe.setAttribute('playsinline', '');
      probe.playsInline = true;
      probe.muted = true;
      try {
        await probe.play();
        probe.pause();
        probe.currentTime = 0;
        htmlAudioUnlocked = true;
        if (!mobileAudioPoolReady) {
          mobileAudioPool = Array.from({ length: MOBILE_AUDIO_POOL_SIZE }, () => {
            const a = new Audio('./guitar.wav?v=20260329c');
            a.preload = 'auto';
            a.setAttribute('playsinline', '');
            a.playsInline = true;
            return a;
          });
          mobileAudioPoolReady = true;
        }
        setStatus('HTML audio unlocked');
      } catch (e) {
        throw new Error('Tap play button again to unlock mobile audio.');
      }
    }

    function getMobileAudioVoice() {
      if (!mobileAudioPoolReady || mobileAudioPool.length === 0) {
        const fallback = new Audio('./guitar.wav?v=20260329c');
        fallback.preload = 'auto';
        fallback.setAttribute('playsinline', '');
        fallback.playsInline = true;
        return fallback;
      }

      const size = mobileAudioPool.length;
      for (let i = 0; i < size; i += 1) {
        const idx = (mobilePoolIndex + i) % size;
        const a = mobileAudioPool[idx];
        if (a.paused || a.ended) {
          mobilePoolIndex = (idx + 1) % size;
          return a;
        }
      }

      const a = mobileAudioPool[mobilePoolIndex];
      mobilePoolIndex = (mobilePoolIndex + 1) % size;
      a.pause();
      a.currentTime = 0;
      return a;
    }

    async function playFreqHtml(freq, when = 0, velocity = 0.95) {
      await ensureHtmlAudioReady();
      const audio = getMobileAudioVoice();
      const loweredFreq = freq * 0.5;
      const rate = Math.max(0.25, Math.min(4.0, loweredFreq / sampleBaseFreq));
      // Ensure playback rate changes pitch on mobile browsers (disable time-stretch pitch correction).
      audio.preservesPitch = false;
      audio.webkitPreservesPitch = false;
      audio.mozPreservesPitch = false;
      audio.defaultPlaybackRate = rate;
      audio.playbackRate = rate;
      audio.volume = Math.max(0.05, Math.min(1.0, velocity));
      const startMs = Math.max(0, Math.round(when * 1000));
      const stopMs = Math.max(120, Math.round((when + FIXED_NOTE_DURATION) * 1000));

      const startVoice = () => {
        audio.currentTime = 0;
        const p = audio.play();
        if (p && typeof p.catch === 'function') {
          p.catch((e) => setStatus(`Audio error: ${e.message || e}`, true));
        }
      };

      if (startMs === 0) {
        startVoice();
      } else {
        setTimeout(startVoice, startMs);
      }

      setTimeout(() => {
        audio.pause();
        audio.currentTime = 0;
      }, stopMs);
    }

    async function playChordHtml(freqs, velocity = 0.9) {
      await ensureHtmlAudioReady();
      const voices = freqs.map(() => getMobileAudioVoice());

      // Configure all voices first, then start them in one tight loop for better sync.
      for (let i = 0; i < voices.length; i += 1) {
        const audio = voices[i];
        const freq = freqs[i];
        const loweredFreq = freq * 0.5;
        const rate = Math.max(0.25, Math.min(4.0, loweredFreq / sampleBaseFreq));
        audio.preservesPitch = false;
        audio.webkitPreservesPitch = false;
        audio.mozPreservesPitch = false;
        audio.defaultPlaybackRate = rate;
        audio.playbackRate = rate;
        audio.volume = Math.max(0.05, Math.min(1.0, velocity));
        audio.currentTime = 0;
      }

      for (let i = 0; i < voices.length; i += 1) {
        const audio = voices[i];
        const p = audio.play();
        if (p && typeof p.catch === 'function') {
          p.catch((e) => setStatus(`Audio error: ${e.message || e}`, true));
        }
      }

      const stopMs = Math.max(120, Math.round(FIXED_NOTE_DURATION * 1000));
      setTimeout(() => {
        for (let i = 0; i < voices.length; i += 1) {
          voices[i].pause();
          voices[i].currentTime = 0;
        }
      }, stopMs);
    }

    function scheduleFreqWithBuffer(buf, freq, when = 0, velocity = 0.95) {
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const loweredFreq = freq * 0.5;
      const rate = Math.max(0.25, Math.min(4.0, loweredFreq / sampleBaseFreq));
      src.playbackRate.value = rate;
      const gain = audioCtx.createGain();
      const t0 = audioCtx.currentTime + when;
      const duration = FIXED_NOTE_DURATION;
      const release = Math.min(0.03, duration * 0.2);
      const releaseStart = Math.max(t0 + 0.01, t0 + duration - release);
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(velocity, t0 + 0.01);
      gain.gain.setValueAtTime(velocity, releaseStart);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
      src.connect(gain).connect(audioCtx.destination);
      src.start(t0);
      src.stop(t0 + duration + 0.01);
    }

    async function playFreq(freq, when = 0, velocity = 0.95) {
      if (isMobileAudio && !mobileWebAudioReady) {
        await playFreqHtml(freq, when, velocity);
        if (when === 0) setStatus('Play command sent (HTML audio mobile)');
        return;
      }
      await ensureAudioReady();
      const buf = await ensureSampleLoaded();
      if (buf) {
        scheduleFreqWithBuffer(buf, freq, when, velocity);
        if (when === 0) setStatus('Play command sent');
        return;
      }
      // Fallback only if sample buffer is unavailable.
      await playFreqHtml(freq, when, velocity);
      if (when === 0) setStatus('Play command sent (HTML audio fallback)');
    }

    async function playChord(freqs) {
      if (isMobileAudio && !mobileWebAudioReady) {
        await playChordHtml(freqs, 0.9);
        setStatus('Play command sent (HTML chord mobile)');
        return;
      }
      await ensureAudioReady();
      const buf = await ensureSampleLoaded();
      if (buf) {
        const start = SCHEDULE_LEAD;
        freqs.forEach(f => scheduleFreqWithBuffer(buf, f, start, 0.9));
        setStatus('Play command sent (scheduled chord)');
        return;
      }

      // Fallback for environments where WebAudio sample decode fails.
      await playChordHtml(freqs, 0.9);
      setStatus('Play command sent (HTML chord fallback)');
    }

    async function playArp(freqs) {
      if (isMobileAudio && !mobileWebAudioReady) {
        freqs.forEach((f, i) => playFreqHtml(f, i * 0.14, 0.9));
        setStatus('Play command sent (HTML arpeggio mobile)');
        return;
      }
      await ensureAudioReady();
      const buf = await ensureSampleLoaded();
      if (buf) {
        const base = SCHEDULE_LEAD;
        freqs.forEach((f, i) => scheduleFreqWithBuffer(buf, f, base + i * 0.14, 0.9));
        setStatus('Play command sent (scheduled arpeggio)');
        return;
      }

      freqs.forEach((f, i) => playFreqHtml(f, i * 0.14, 0.9));
      setStatus('Play command sent (HTML arpeggio fallback)');
    }

    async function autoUnlockAudio() {
      if (isMobileAudio) {
        await ensureMobileWebAudioReady();
        if (mobileWebAudioReady) return;
        await ensureHtmlAudioReady();
        return;
      }
      if (audioUnlocked && audioCtx.state === 'running') return;
      await ensureAudioReady();
      await ensureSampleLoaded();
    }

    function noteButtons(names, freqs) {
      return names.map((name, idx) => `<button data-f='${freqs[idx]}'>${name}</button>`).join('');
    }

    async function ensurePyReady() {
      if (pyReady) return pyReady;
      pyReady = (async () => {
        pyodide = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.27.5/full/' });
        const pySrc = await (await fetch('./GuitarChords.py?v=20260329b')).text();

        // Static mode: execute only the chord engine section, skip Flask route registration.
        const splitMarker = '\nvisualizer_web = GuitarChords()\n';
        const markerIdx = pySrc.indexOf(splitMarker);
        const engineOnly = markerIdx >= 0 ? pySrc.slice(0, markerIdx) : pySrc;

        await pyodide.runPythonAsync(engineOnly + '\nvisualizer_static = GuitarChords()\n');
      })();
      return pyReady;
    }

    async function fetchGroups() {
      await ensurePyReady();
      pyodide.globals.set('arg_chord', state.chord);
      pyodide.globals.set('arg_filter', state.inversionFilter);
      const payloadJson = await pyodide.runPythonAsync(`import json\njson.dumps(visualizer_static.get_shapes_grouped(chord_name=arg_chord, max_shapes=None, inversion_filter=arg_filter), ensure_ascii=False)`);
      return JSON.parse(payloadJson);
    }

    function render(data) {
      sampleBaseFreq = data.sample_base_freq || 110.0;
      const filterLabelMap = { all: 'All', root: 'Root', '1st': '1st', '2nd': '2nd', '3rd': '3rd' };
      const activeFilter = filterLabelMap[data.inversion_filter] || 'All';
      document.getElementById('meta').textContent = `Chord ${data.chord} | Filter ${activeFilter} | Matched ${data.total_visible} shapes`;

      const filterSelect = document.getElementById('inversion-filter');
      const counts = data.inversion_counts || {};
      const options = [
        { value: 'all', label: 'All' },
        { value: 'root', label: `Root position (${counts.root ?? 0})` },
        { value: '1st', label: `1st inversion (${counts['1st'] ?? 0})` },
        { value: '2nd', label: `2nd inversion (${counts['2nd'] ?? 0})` },
        { value: '3rd', label: `3rd inversion (${counts['3rd'] ?? 0})` },
      ];
      filterSelect.innerHTML = options.map(opt => `<option value='${opt.value}'>${opt.label}</option>`).join('');
      filterSelect.value = state.inversionFilter;

      const groups = document.getElementById('groups');
      const jump = document.getElementById('jump');
      const order = ['C', 'A', 'G', 'E', 'D'];
      const availableGroups = order.filter(key => (data.groups[key] || []).length > 0);
      const groupLinks = availableGroups.map(key => `<a href='#' data-group='${key}'>${key}-shape (${(data.groups[key] || []).length})</a>`);

      state.pageCount = Math.max(1, availableGroups.length);
      state.page = Math.max(1, Math.min(state.page, state.pageCount));
      const activeGroup = availableGroups[state.page - 1] || null;
      const pageItems = activeGroup ? (data.groups[activeGroup] || []) : [];

      jump.innerHTML = groupLinks.join(' ');
      jump.querySelectorAll('a[data-group]').forEach(link => {
        link.onclick = (e) => {
          e.preventDefault();
          const target = link.getAttribute('data-group');
          const idx = availableGroups.indexOf(target);
          if (idx >= 0) {
            state.page = idx + 1;
            render(data);
          }
        };
      });

      groups.innerHTML = activeGroup ? (() => {
        const cards = pageItems.map(item => `
          <div class='card' id='${item.anchor}'>
            <div>Fingering: ${item.fingering}${item.is_inversion ? ` | Inversion: ${item.inversion}` : ''}</div>
            <div class='svg-wrap'>${item.svg}</div>
            <div class='notes'>
              <span>Shape Notes:</span>
              <button class='play-shape-arp'>Arpeggio</button>
              <button class='play-shape-chord'>Chord</button>
              ${noteButtons(item.shape_note_names, item.shape_note_freqs)}
            </div>
          </div>
        `).join('');
        return `<div class='group-title'>${activeGroup}-shape (${pageItems.length})</div><div class='grid'>${cards}</div>`;
      })() : '';

      const allCards = groups.querySelectorAll('.card');
      allCards.forEach((card, idx) => {
        const item = pageItems[idx];
        if (!item) return;
        card.querySelector('.play-shape-arp').onclick = async () => {
          try {
            setStatus('Trying arpeggio...');
            await autoUnlockAudio();
            await playArp(item.shape_note_freqs);
          } catch (e) {
            setStatus(`Audio error: ${e.message}`, true);
            document.getElementById('meta').textContent = `Audio error: ${e.message}`;
          }
        };
        card.querySelector('.play-shape-chord').onclick = async () => {
          try {
            setStatus('Trying chord...');
            await autoUnlockAudio();
            await playChord(item.shape_note_freqs);
          } catch (e) {
            setStatus(`Audio error: ${e.message}`, true);
            document.getElementById('meta').textContent = `Audio error: ${e.message}`;
          }
        };
        card.querySelectorAll('button[data-f]').forEach(btn => {
          btn.onclick = async () => {
            try {
              setStatus('Trying single note...');
              await autoUnlockAudio();
              await playFreq(parseFloat(btn.dataset.f), 0, 0.95);
            } catch (e) {
              setStatus(`Audio error: ${e.message}`, true);
              document.getElementById('meta').textContent = `Audio error: ${e.message}`;
            }
          };
        });
      });
    }

    async function load() {
      try {
        setStatus('Loading chord engine...');
        const data = await fetchGroups();
        render(data);
        setStatus('Ready');
      } catch (e) {
        setStatus(`Error: ${e.message}`, true);
        document.getElementById('meta').textContent = `Error: ${e.message}`;
      }
    }

    function runSearch(resetPage = true) {
      state.chord = document.getElementById('chord').value.trim() || 'C';
      state.inversionFilter = document.getElementById('inversion-filter').value;
      if (resetPage) state.page = 1;
      load();
    }

    document.getElementById('search').onclick = () => runSearch(true);
    document.getElementById('chord').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        runSearch(true);
      }
    });
    document.getElementById('inversion-filter').addEventListener('change', () => runSearch(true));

    load();
  </script>
</body>
</html>
